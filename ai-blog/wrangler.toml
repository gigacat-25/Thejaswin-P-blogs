name = "ai-blog"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build"
watch_dir = "src"

[[d1_databases]]
binding = "DB"
database_name = "ai-blog-db"
database_id = "9d891d85-3634-4fe2-81f1-2534ed407b6d"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "ai-blog-assets"
